<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexore AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ambient -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<canvas id="sparkCanvas"></canvas>

<!-- SVG sprite -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <symbol id="ic-logo" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="28" stroke="rgba(255,255,255,.18)" stroke-width="1.2"/>
      <circle cx="32" cy="32" r="18" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
      <path d="M32 4L36 28 32 32 28 28Z" fill="rgba(255,255,255,.72)"/>
      <path d="M60 32L36 36 32 32 36 28Z" fill="rgba(255,255,255,.45)"/>
      <path d="M32 60L28 36 32 32 36 36Z" fill="rgba(255,255,255,.62)"/>
      <path d="M4 32L28 28 32 32 28 36Z" fill="rgba(255,255,255,.35)"/>
      <circle cx="32" cy="32" r="4.5" fill="white"/>
    </symbol>
    <symbol id="ic-spark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </symbol>
    <symbol id="ic-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </symbol>
    <symbol id="ic-msg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </symbol>
    <symbol id="ic-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
    </symbol>
    <symbol id="ic-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </symbol>
    <symbol id="ic-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </symbol>
    <symbol id="ic-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </symbol>
    <symbol id="ic-cpu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="4" width="16" height="16" rx="2"/><rect x="8" y="8" width="8" height="8" rx="1"/>
      <line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/>
      <line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/>
      <line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/>
      <line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/>
    </symbol>
    <symbol id="ic-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/>
    </symbol>
    <symbol id="ic-code" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
    </symbol>
    <symbol id="ic-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </symbol>
    <symbol id="ic-warn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </symbol>
    <symbol id="ic-image" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </symbol>
    <symbol id="ic-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </symbol>
  </defs>
</svg>

<!-- ── LANDING ── -->
<div class="page active" id="landing">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 64 64"><use href="#ic-logo"/></svg>
    </div>
    <div class="logo-text">Nexore AI</div>
    <div class="logo-sub">Powered by Groq · llama-3.3-70b</div>
  </div>

  <p class="headline">ذكاء اصطناعي متطور بسرعة لا تُصدَّق — ابدأ محادثتك الآن</p>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="auth-tab" onclick="switchTab('register')">إنشاء حساب</button>
    </div>

    <div id="loginForm">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input type="password" class="form-input" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-primary" onclick="doLogin()">دخول</button>
      <div class="error-msg" id="loginError"></div>
    </div>

    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label class="form-label">الاسم</label>
        <input type="text" class="form-input" id="regName" placeholder="اسمك">
      </div>
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" class="form-input" id="regEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input type="password" class="form-input" id="regPass" placeholder="6 أحرف على الأقل" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <button class="btn-primary" onclick="doRegister()">إنشاء الحساب</button>
      <div class="error-msg" id="regError"></div>
    </div>
  </div>

  <div class="landing-footer">تم صنعه بواسطة <span>Nexore Team</span></div>
</div>

<!-- ── CHAT ── -->
<div class="page" id="chat">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">Nexore AI</span>
    </div>
    <button class="new-chat-btn" onclick="newChat()">
      <svg width="15" height="15"><use href="#ic-plus"/></svg>
      محادثة جديدة
    </button>
    <div class="chats-label">المحادثات</div>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-email" id="userEmail">-</div>
      </div>
      <button class="logout-btn" onclick="doLogout()">
        <svg width="13" height="13"><use href="#ic-logout"/></svg>
        تسجيل الخروج
      </button>
    </div>
  </div>

  <div class="chat-main">
    <div class="chat-topbar">
      <button class="menu-btn" onclick="toggleSidebar(true)">
        <svg width="17" height="17"><use href="#ic-menu"/></svg>
      </button>
      <div class="model-badge">
        <div class="model-dot"></div>
        llama-3.3-70b-versatile
      </div>
      <div class="chat-title-bar" id="currentChatTitle">محادثة جديدة</div>
    </div>

    <div class="messages-wrap" id="messagesWrap"></div>

    <!-- Image preview strip -->
    <div class="img-preview-bar" id="imgPreviewBar" style="display:none"></div>

    <div class="input-area">
      <div class="input-wrap">
        <!-- Hidden file input -->
        <input type="file" id="imgFileInput" accept="image/*" multiple style="display:none" onchange="handleImgSelect(event)">
        <!-- Image button -->
        <button class="img-btn" title="إرفاق صورة" onclick="document.getElementById('imgFileInput').click()">
          <svg width="17" height="17"><use href="#ic-image"/></svg>
        </button>
        <textarea id="userInput" placeholder="اكتب رسالتك هنا..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg width="14" height="14"><use href="#ic-send"/></svg>
        </button>
      </div>
      <div class="input-hint">Enter للإرسال · Shift+Enter للسطر الجديد · 🖼 أرفق صورة</div>
    </div>

    <div class="made-by">تم صنعه بواسطة <span>Nexore Team</span></div>
  </div>
</div>

<script src="sparks.js"></script>
<script src="app.js"></script>
</body>
</html>
